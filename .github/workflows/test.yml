name: Tests

on:
  push:
    branches: [main]
  pull_request:

# Local execution:
#   Install nektos/act (https://github.com/nektos/act) and Docker.
#   Then run:
#     act -j test    # run test job only
#     act -j lint    # run lint job only
#     act            # run all jobs
# Uses catthehacker/ubuntu:act-22.04 runner image by default.

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            neovim_version: nightly

          - os: ubuntu-22.04
            neovim_version: v0.10.0
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Neovim
        uses: rhysd/action-setup-vim@febef33995d6649302e9d88dda81e071b68f16a7 # v1.6.1
        with:
          neovim: true
          version: ${{ matrix.neovim_version }}


      - name: Install plenary.nvim
        run: |
          mkdir -p ~/.local/share/nvim/site/pack/vendor/start
          git clone --depth 1 https://github.com/nvim-lua/plenary.nvim \
            ~/.local/share/nvim/site/pack/vendor/start/plenary.nvim

      - name: Run tests
        run: |
          nvim --version
          nvim --headless -c "PlenaryBustedDirectory tests/" -c "qa"

  lint:
    name: Lint code
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Stylua
        run: |
          curl -fsSL https://github.com/JohnnyMorganz/StyLua/releases/download/v2.0.2/stylua-linux-x86_64.zip -o /tmp/stylua.zip
          unzip -o /tmp/stylua.zip -d /usr/local/bin/

      - name: Install luacheck
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq luarocks
          sudo luarocks install luacheck

      - name: Run luacheck
        run: luacheck lua/
