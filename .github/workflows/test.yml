name: Tests

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    name: Run tests
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            neovim_version: nightly
          - os: ubuntu-22.04
            neovim_version: v0.10.0

    steps:
      - name: Checkout repository
        uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3

      - name: Setup Neovim
        uses: rhysd/action-setup-vim@febef33995d6649302e9d88dda81e071b68f16a7 # v1.6.1
        with:
          neovim: ${{ matrix.neovim_version }}

      - name: Install plenary.nvim
        run: |
          git clone --depth 1 https://github.com/nvim-lua/plenary.nvim .plenary

      - name: Run tests
        run: |
          export NVIM_RTP="${PWD}/.plenary:${PWD}"
          nvim --version
          nvim --headless -c "PlenaryBustedDirectory tests/ {}" -c "qa"

  lint:
    name: Lint code
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pre-commit
        run: pip install pre-commit

      - name: Install stylua
        run: sudo apt-get update && sudo apt-get install -y stylua

      - name: Install luacheck
        run: sudo apt-get install -y luacheck

      - name: Run pre-commit
        run: pre-commit run --all-files
